esphome:
  name: eink-dashboard
  friendly_name: E-Ink Dashboard
  on_boot:
    priority: 600
    then:
      - delay: 20s
      - component.update: dashboard_image
      - delay: 3s
      - component.update: eink_display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "E-Ink Dashboard Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal:

http_request:
  # Appropriate for a renderer served over HTTP on a trusted local network.
  verify_ssl: false
  timeout: 10s

spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11

button:
  - platform: template
    name: "Refresh E-Paper"
    on_press:
      - component.update: dashboard_image
      - delay: 3s
      - component.update: eink_display

online_image:
  - url: !secret dashboard_url
    id: dashboard_image
    format: PNG
    type: BINARY
    update_interval: 15min
    on_download_finished:
      - component.update: eink_display
    on_error:
      - logger.log:
          level: WARN
          format: "Failed to download dashboard image"

display:
  - platform: waveshare_epaper
    id: eink_display
    cs_pin: GPIO10
    dc_pin: GPIO9
    reset_pin: GPIO8
    busy_pin: GPIO7
    model: 7.50inV2
    update_interval: never
    rotation: 0
    lambda: |-
      it.fill(COLOR_ON);
      it.image(0, 0, id(dashboard_image), COLOR_OFF, COLOR_ON);

light:
  - platform: esp32_rmt_led_strip
    id: rgb_led
    name: "RGB LED"
    chipset: WS2812
    pin: GPIO48
    num_leds: 1
    rgb_order: GRB
    restore_mode: ALWAYS_OFF
    effects:
      - addressable_rainbow:
          name: Rainbow
          speed: 10
          width: 50
